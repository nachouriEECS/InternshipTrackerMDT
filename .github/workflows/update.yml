name: Update internship listings

on:
  schedule:
    - cron: "17 13 * * *"
    - cron: "17 17 * * *"
    - cron: "17 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python tracker.py

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain internships.json meta.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add internships.json meta.json
            git commit -m "chore: update internship listings ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to internships.json or meta.json"
          fi

      - name: Notify Slack of new postings
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITE_URL: https://nachourieecs.github.io/InternshipTrackerMDT/
        run: python notify_slack.py
